site_name: GoodLiveClimax ドキュメント
site_description: 個人VTuber向けライブ演出ソフト「GoodLiveClimax」の公式ドキュメント
site_url: https://zainnstar.github.io/GoodLiveClimax_Document/
repo_url: https://github.com/zainnstar/GoodLiveClimax_Document
repo_name: zainnstar/GoodLiveClimax_Document
copyright: Copyright &copy; 2026 稲峰幸司 Inamine Kosuke - GoodLuckLab

theme:
  name: material
  language: ja
  logo: img/GLClimax_Icon.png
  favicon: img/GLClimax_Icon.png
  palette:
    # ライトモード
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    # ダークモード
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables

nav:
  - はじめに: index.md
  - インストール: installation.md
  - クイックスタート: getting-started.md
  - アセット:
      - アセット一覧: assets/overview.md
      - アバター: assets/avatar.md
      - カメラ: assets/camera.md
      - ライト: assets/light.md
      - レーザービーム: assets/laser.md
      - アイテム: assets/item.md
      - パーティクル: assets/particle.md
      - ミラー: assets/mirror.md
      - スクリーン: assets/screen.md
      - 3Dテキスト: assets/text3d.md
      - サイリウム: assets/cyalume.md
  - パネル:
      - パネル一覧: panels/overview.md
      - カメラ操作: panels/camera.md
      - ライト操作: panels/light.md
      - レーザー操作: panels/laser.md
      - トラッキング: panels/tracking.md
      - シーンデータコピー: panels/scene-copy.md
      - PixelFixtureライト: panels/pixel-fixture.md
  - ノード:
      - ノードの概要: nodes/overview.md
      - Bool: nodes/bool.md
      - Color: nodes/color.md
      - Event: nodes/event.md
      - Expression: nodes/expression.md
      - Float: nodes/float.md
      - Flow Control: nodes/flow-control.md
      - Function: nodes/function.md
      - Int: nodes/int.md
      - List: nodes/list.md
      - Logic: nodes/logic.md
      - Material: nodes/material.md
      - OSC: nodes/osc.md
      - Random: nodes/random.md
  - MODの作り方:
      - MODとは: mod/overview.md
      - MOD作成手順: mod/creating-mod.md
      - SDK ダウンロード: mod/sdk.md
  - ライセンス: license.md
  - FAQ: faq.md
