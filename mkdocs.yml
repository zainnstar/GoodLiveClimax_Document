site_name: GoodLiveClimax ドキュメント
site_description: 個人VTuber向けライブ演出ソフト「GoodLiveClimax」の公式ドキュメント
site_url: https://zainnstar.github.io/GoodLiveClimax_Document/
repo_url: https://github.com/zainnstar/GoodLiveClimax_Document
repo_name: zainnstar/GoodLiveClimax_Document
copyright: Copyright &copy; 2026 稲峰幸助 Inamine Kosuke - GoodLuckLab

theme:
  name: material
  language: ja
  logo: img/GLClimax_Icon.png
  favicon: img/GLClimax_Icon.png
  palette:
    # ライトモード
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    # ダークモード
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables

nav:
  - はじめに: index.md
  - インストール: installation.md
  - クイックスタート: getting-started.md
  - アセット:
      - アセット一覧: assets/overview.md
      - アバター: assets/avatar.md
      - カメラ: assets/camera.md
      - ライト: assets/light.md
      - レーザービーム: assets/laser.md
      - アイテム: assets/item.md
      - パーティクル: assets/particle.md
      - ミラー: assets/mirror.md
      - スクリーン: assets/screen.md
      - 3Dテキスト: assets/text3d.md
      - サイリウム: assets/cyalume.md
  - パネル:
      - パネル一覧: panels/overview.md
      - カメラ操作: panels/camera.md
      - ライト操作: panels/light.md
      - レーザー操作: panels/laser.md
      - トラッキング: panels/tracking.md
      - シーンデータコピー: panels/scene-copy.md
      - PixelFixtureライト: panels/pixel-fixture.md
  - ノード:
      - ノードの概要: nodes/overview.md
      - "Bool": nodes/bool.md
      - "BP制御 (BP Control)": nodes/bp-control.md
      - "BPM": nodes/bpm.md
      - "Camera": nodes/camera-node.md
      - "Expression / Math": nodes/expression.md
      - "Float": nodes/float.md
      - "Int": nodes/int.md
      - "OSC": nodes/osc.md
      - "Twitch": nodes/twitch.md
      - "Vector2": nodes/vector2.md
      - "Vector3": nodes/vector3.md
      - "YouTube": nodes/youtube.md
      - "Asset（アセット）": nodes/asset-node.md
      - "イベント (Event)": nodes/event.md
      - "カラー (Color)": nodes/color.md
      - "シーン (Scene)": nodes/scene.md
      - "テレポート (Teleport)": nodes/teleport.md
      - "デバッグ (Debug)": nodes/debug.md
      - "トラッキング (Tracking)": nodes/tracking-node.md
      - "トランスフォーム (Transform)": nodes/transform-node.md
      - "パーティクル (Particle)": nodes/particle-node.md
      - "フロー制御 (Flow Control)": nodes/flow-control.md
      - "マテリアル (Material)": nodes/material.md
      - "ユーティリティ (Utility)": nodes/utility.md
      - "ランダム (Random)": nodes/random.md
      - "リスト (List)": nodes/list.md
      - "変換 (Convert)": nodes/convert.md
      - "文字列 (String)": nodes/string.md
      - "時間 (Time)": nodes/time.md
      - "関数 (Function)": nodes/function.md
  - MODの作り方:
      - MODとは: mod/overview.md
      - MOD作成手順: mod/creating-mod.md
      - SDK ダウンロード: mod/sdk.md
  - ライセンス: license.md
  - FAQ: faq.md
